<nav class="main-navbar">
  <div class="nav-side"></div>
  <div class="nav-center">
    <div class="nav-scroll-wrapper">
      @for (cat of categories; track cat) {
        <button class="nav-link" [class.active]="activeCategory === cat" (click)="scrollToCategory(cat)">
          {{ cat | titlecase }}
        </button>
      }
    </div>
  </div>
  <div class="nav-side justify-end">
    <button class="cart-button" (click)="handleCartClick()">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="cart-icon">
        <circle cx="8" cy="21" r="1"></circle><circle cx="19" cy="21" r="1"></circle>
        <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path>
      </svg>
      @if (cartCount() > 0) {
        <span class="cart-badge">{{ cartCount() }}</span>
      }
    </button>
  </div>
</nav>
