<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closeModal()">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    
    <div class="modal-content">
      <div class="image-container">
        <img [src]="product.image" [alt]="product.name">
      </div>

      <div class="info-container">
        <div class="header">
          <h2>{{ product.name }}</h2>
          <span class="price-tag">{{ product.price | currency }}</span>
        </div>
        
        <p class="description">{{ product.description }}</p>

        <div class="form-group">
          <label for="note">¿Alguna instrucción especial?</label>
          <textarea 
            id="note" 
            [(ngModel)]="note" 
            placeholder="Ej: Sin cebolla, bien cocido, etc.">
          </textarea>
        </div>

        <div class="footer-actions">
          <div class="quantity-selector">
            <button (click)="decrement()" [disabled]="quantity() <= 1">-</button>
            <span class="qty">{{ quantity() }}</span>
            <button (click)="increment()">+</button>
          </div>
          
          <button class="add-to-cart-btn" (click)="handleConfirm()">
            Agregar <span>{{ (product.price * quantity()) | currency }}</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
